# iGreenProduct 生产环境 Nginx 配置
# 文件位置: /www/server/panel/vhost/nginx/igreen.yourdomain.com.conf
# 域名: igreen.yourdomain.com (请替换为实际域名)

server {
    listen 80;
    server_name igreen.yourdomain.com;

    # 根目录 (可选，用于存放静态前端文件)
    root /www/wwwroot/igreen.yourdomain.com;
    index index.html index.htm;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API 请求反向代理到 Spring Boot (8080端口)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # API 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 大文件上传支持
        client_max_body_size 50m;
    }

    # 健康检查端点 (公开访问，无需认证)
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 健康检查不记录访问日志
        access_log off;
    }

    # 静态文件访问 (文件上传后的访问路径)
    location /uploads/ {
        alias /opt/igreen/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;

        # 记录文件访问日志
        access_log /www/wwwlogs/igreen.uploads.log;
    }

    # 安全限制 - 禁止执行脚本文件
    location ~* ^/uploads/.*\.(php|jsp|asp|exe|bat|cmd|com|phtml|shtml)$ {
        deny all;
        return 403;
    }

    # 允许的文件类型
    location ~* ^/uploads/.*\.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|txt|zip|rar)$ {
        alias /opt/igreen/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Type $content_type;
        try_files $uri =404;

        # 记录文件访问日志
        access_log /www/wwwlogs/igreen.uploads.log;
    }

    # 前端静态文件 (React/Vue等构建后的文件)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存优化 (非API和uploads路径)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Gzip压缩
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1024;
    }

    # HTML文件不缓存
    location ~* \.(html|htm)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Gzip 全局配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # 访问日志
    access_log /www/wwwlogs/igreen.yourdomain.com.log;
    error_log /www/wwwlogs/igreen.yourdomain.com.error.log;

    # 文件上传大小限制
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # 隐藏 Nginx 版本信息
    server_tokens off;
}

# HTTPS 配置 (如果配置SSL证书)
server {
    listen 443 ssl http2;
    server_name igreen.yourdomain.com;

    # SSL 证书配置 (宝塔面板会自动生成)
    ssl_certificate /www/server/panel/vhost/cert/igreen.yourdomain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/igreen.yourdomain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE:!DES:!3DES:!AES256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 包含 HTTP 配置的所有 location 块
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        client_max_body_size 50m;
    }

    location /actuator/health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }

    location /uploads/ {
        alias /opt/igreen/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;

        access_log /www/wwwlogs/igreen.uploads.log;
    }

    # HTTPS 安全限制 - 禁止执行脚本文件
    location ~* ^/uploads/.*\.(php|jsp|asp|exe|bat|cmd|com|phtml|shtml)$ {
        deny all;
        return 403;
    }

    # HTTPS 允许的文件类型
    location ~* ^/uploads/.*\.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|txt|zip|rar)$ {
        alias /opt/igreen/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Type $content_type;
        try_files $uri =404;

        access_log /www/wwwlogs/igreen.uploads.log;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTTPS 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;

        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1024;
    }

    # HTTPS HTML文件不缓存
    location ~* \.(html|htm)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # HTTPS 特有的安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # 日志
    access_log /www/wwwlogs/igreen.yourdomain.com.ssl.log;
    error_log /www/wwwlogs/igreen.yourdomain.com.ssl.error.log;

    # 文件上传大小限制
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;

    server_tokens off;
}</content>
