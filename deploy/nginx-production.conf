# ========================================
# 宝塔面板专用配置 (可选)
# ========================================
# 如果使用宝塔面板，可以将以上配置复制到:
# /www/server/panel/vhost/nginx/igreen.conf
#
# 面板会自动处理SSL证书申请和管理
# 建议在面板中手动配置以获得更好的管理体验
