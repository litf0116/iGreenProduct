# =============================================
# iGreenProduct 生产环境 Nginx 配置
# =============================================
#
# 部署说明:
# 1. 复制此文件到: /etc/nginx/conf.d/igreen.conf
# 2. 修改 DOMAIN_NAME 为实际域名
# 3. 测试配置: nginx -t
# 4. 重载配置: nginx -s reload
#
# SSL配置 (需要先申请SSL证书):
# 1. 申请SSL证书后配置证书路径
# 2. 或使用宝塔面板自动申请Let's Encrypt证书
# =============================================

# 域名配置 - 请修改为实际域名
set $DOMAIN_NAME "igreen.yourdomain.com";

# 上游后端服务器
upstream igreen_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# 重定向HTTP到HTTPS (SSL证书申请后启用)
# server {
#     listen 80;
#     server_name $DOMAIN_NAME;
#     return 301 https://$host$request_uri;
# }

# HTTP 服务器配置
server {
    listen 80;
    server_name $DOMAIN_NAME;

    # 根目录和索引
    root /opt/igreen/iGreenApp/dist;
    index index.html index.htm;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================
    # API 反向代理配置
    # ========================================
    location /api/ {
        proxy_pass http://igreen_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 原始请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # API 请求不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 大文件上传支持
        client_max_body_size 50m;
    }

    # ========================================
    # 健康检查端点
    # ========================================
    location /actuator/health {
        proxy_pass http://igreen_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 健康检查不记录访问日志
        access_log off;
    }

    # ========================================
    # Swagger API文档
    # ========================================
    location /swagger-ui.html {
        proxy_pass http://igreen_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v3/api-docs {
        proxy_pass http://igreen_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================
    # 静态文件上传目录
    # ========================================
    location /uploads/ {
        alias /opt/igreen/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;

        # 允许的文件类型
        location ~* ^/uploads/.*\.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|txt|zip|rar)$ {
            add_header Content-Type $content_type;
            try_files $uri =404;
        }

        # 禁止执行脚本文件 (安全)
        location ~* ^/uploads/.*\.(php|jsp|asp|exe|bat|cmd|com|phtml|shtml|js|vbs)$ {
            deny all;
            return 403;
        }

        # 记录文件访问日志
        access_log /var/log/nginx/igreen-uploads.log;
    }

    # ========================================
    # 管理后台 (igreen-front)
    # ========================================
    location /admin/ {
        alias /opt/igreen/igreen-front/dist/;
        try_files $uri $uri/ /admin/index.html;

        # 静态资源缓存
        location ~* ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }
    }

    # ========================================
    # 前端静态文件 (SPA支持)
    # ========================================
    location / {
        try_files $uri $uri/ /index.html;

        # HTML文件不缓存
        location ~* \.(html|htm)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # 静态资源缓存优化
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ========================================
    # Gzip 压缩配置
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype;

    # ========================================
    # 错误页面
    # ========================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ========================================
    # 日志配置
    # ========================================
    access_log /var/log/nginx/igreen-access.log;
    error_log /var/log/nginx/igreen-error.log;

    # ========================================
    # 文件上传限制
    # ========================================
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ========================================
    # 隐藏Nginx版本
    # ========================================
    server_tokens off;
}

