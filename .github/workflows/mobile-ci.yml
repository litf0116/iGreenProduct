name: iGreenApp CI (Mobile)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'iGreenApp/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'iGreenApp/**'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: iGreenApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: iGreenApp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: 当添加 Vitest 后启用
      # - name: Run unit tests
      #   run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit || true

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: iGreenApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: iGreenApp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-dist
          path: iGreenApp/dist/
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    defaults:
      run:
        working-directory: iGreenApp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: iGreenApp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync to Android
        run: pnpm npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: iGreenApp/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
