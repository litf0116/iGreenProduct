# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/igreen_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: igreen_db
    password: knS8jexaAnByhpj4
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
server:
  port: ${SERVER_PORT:8089}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  error:
    include-message: never

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY:aVeryLongAndSecureSecretKeyForJwtTokenGeneration2024}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  upload:
    dir: ${UPLOAD_DIR:/data/uploads}
    max-size: ${MAX_FILE_SIZE:52428800}  # 50MB
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:3001}

springdoc:
  api-docs:
    enabled: false  # 生产环境关闭API文档
  swagger-ui:
    enabled: false

knife4j:
  enable: false  # 生产环境关闭Knife4j文档
  setting:
    language: zh_CN
    enable-version: true
    enable-footer: true
    footerCustomContent: v1.0.0 | iGreen Product API

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.igreen: INFO
    org.springframework: WARN
    org.springframework.security: INFO
    org.hibernate: WARN
    org.springframework.web: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/data/igreen/logs/igreen-backend.log}
    max-size: 100MB
    max-history: 30
