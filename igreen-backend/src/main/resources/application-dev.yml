# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://43.255.212.68:3306/igreen_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: igreen_db
    password: knS8jexaAnByhpj4
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  threads:
    virtual:
      enabled: true

server:
  port: 8089

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dev-secret-key-change-in-production}
    expiration-ms: ${JWT_ACCESS_EXPIRATION:7200000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    max-size: ${MAX_FILE_SIZE:10485760}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:3001,http://192.168.10.154:3000,http://192.168.1.100:3000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_CN
    enable-version: true
    enable-footer: true
    footerCustomContent: v1.0.0 | iGreen Product API

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: DEBUG
    com.igreen: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: DEBUG
