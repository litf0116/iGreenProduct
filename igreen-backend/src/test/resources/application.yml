spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 0

app:
  jwt:
    secret-key: test-jwt-secret-key-for-unit-testing-purposes
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: "*"
    allowed-methods: "*"
    allowed-headers: "*"

logging:
  level:
    root: WARN
    com.igreen: DEBUG
